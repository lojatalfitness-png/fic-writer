<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fiction Writer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,700;0,800;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="app.css">
</head>

<body>

  <!-- ═══════════════════════════
  EDITOR PAGE
═══════════════════════════ -->
  <div id="editor-page">
    <div id="topbar">
      <button id="fold-btn" title="Open menu">
        <img src="fold.png" class="fold-icon" alt="menu">
      </button>
      <div id="save-status">
        <div id="save-dot"></div>
        <span id="save-label">0 words</span>
      </div>
    </div>
    <div id="chapter-label">Chapter <span id="lbl-num">1</span> — <span id="lbl-name">untitled</span></div>
    <textarea id="write-area" placeholder="Everthing starts here…" spellcheck="false"></textarea>
  </div>

  <!-- overlay -->
  <div id="overlay"></div>

  <!-- ═══════════════════════════
  MID DRAWER
═══════════════════════════ -->
  <div id="mid-drawer">
    <div id="mid-left-edge">
      <div class="edge-lines">
        <div class="eline"></div>
        <div class="eline"></div>
      </div>
    </div>
    <div id="mid-right-edge">
      <div class="edge-lines">
        <div class="eline"></div>
        <div class="eline"></div>
      </div>
    </div>

    <div id="mid-content">
      <button class="section-btn" id="btn-chapters">Chapters.. <span class="s-count" id="c-ch">0</span></button>
      <button class="section-btn" id="btn-timeline">Timeline.. <span class="s-count" id="c-tl">0</span></button>
      <button class="section-btn" id="btn-promises">Promises.. <span class="s-count" id="c-pp">0</span></button>
      <button class="section-btn" id="btn-characters">Characters.. <span class="s-count" id="c-ch2">0</span></button>
    </div>

    <div id="mid-bottom">
      <button id="add-file-btn">+</button>
    </div>
  </div>

  <!-- ═══════════════════════════
   DRAWER (Methods / AI Commands)
═══════════════════════════ -->
  <div id="right-drawer">
    <div id="right-content">
      <div class="r-header">
        <div class="r-tag">-Methods-</div>
        <div class="r-title">AI Commands</div>
        <div class="r-sub">Internal rules — context for the AI</div>
      </div>
      <div class="r-scroll" id="aic-list"></div>
      <div style="flex-shrink:0;padding-bottom:8px;display:flex;justify-content:center;">
        <button class="btn-add" id="add-aic">+ add rule</button>
      </div>
    </div>
    <div id="right-left-edge">


    </div>
  </div>
  </div>

  <!-- ═══════════════════════════
  DETAIL OVERLAY
═══════════════════════════ -->
  <div id="detail-overlay">
    <div id="det-topbar">
      <button id="det-back">‹ back</button>
      <div id="det-title">Chapters</div>
      <button id="trash-btn" title="Trash">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
        <span id="trash-count-badge"></span>
      </button>
    </div>
    <div id="det-scroll"></div>
    <div id="det-add-row"><button class="btn-add" id="det-add-btn">+ add</button></div>
  </div>

  <!-- ═══════════════════════════
  TRASH OVERLAY
═══════════════════════════ -->
  <div id="trash-overlay">
    <div id="trash-topbar">
      <button id="trash-back">‹ back</button>
      <div id="trash-title">🗑 Trash</div>
    </div>
    <div id="trash-scroll"></div>
  </div>

  <!-- ═══════════════════════════
  ADD FILE MODAL  (nome da nova nota)
═══════════════════════════ -->
  <div id="add-modal">
    <div id="add-modal-inner">
      <div class="modal-title">New note…</div>
      <input id="new-note-name" class="modal-name-inp" placeholder="Note title…" autocomplete="off" spellcheck="false">
      <button class="modal-opt" id="modal-confirm">Create</button>
      <button class="modal-cancel" id="modal-cancel">cancel</button>
    </div>
  </div>

  <!-- ═══════════════════════════
  ITEM VIEW (timeline / characters)
═══════════════════════════ -->
  <div id="item-view">
    <div id="item-view-topbar">
      <button id="item-view-back">‹ back</button>
      <div id="item-view-title"></div>
      <button id="item-view-del" title="Delete">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
      </button>
    </div>
    <div id="item-view-body"></div>
  </div>

  <!-- ═══════════════════════════
  NOTE VIEW
═══════════════════════════ -->
  <div id="note-view">
    <div id="note-view-topbar">
      <button id="note-view-back">‹ back</button>
      <input id="note-view-title-inp" placeholder="Note title…" autocomplete="off" spellcheck="false">
      <button id="note-view-del" title="Delete">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6" />
          <path d="M19 6l-1 14H6L5 6" />
          <path d="M10 11v6M14 11v6" />
          <path d="M9 6V4h6v2" />
        </svg>
      </button>
    </div>
    <textarea id="note-view-body" placeholder="Write anything…" spellcheck="false"></textarea>
  </div>
  <script src="app.js"></script>
</body>

</html>
